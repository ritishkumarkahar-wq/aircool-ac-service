<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Appliances Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d1117;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .banner {
      position: relative;
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 6;
      overflow: hidden;
      border-radius: 18px;
      background: linear-gradient(to bottom, #13c7cf 0%, #0a9fe8 65%, #066ad1 100%);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .ground {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 12%;
      background: linear-gradient(to top, rgba(0, 55, 140, 0.6), rgba(255,255,255,0.05));
    }
