<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Appliances Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d1117;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .banner {
      position: relative;
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 6;
      overflow: hidden;
      border-radius: 18px;
      background: linear-gradient(to bottom, #13c7cf 0%, #0a9fe8 65%, #066ad1 100%);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .ground {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 12%;
      background: linear-gradient(to top, rgba(0, 55, 140, 0.6), rgba(255,255,255,0.05));
    }

    .item {
      position: absolute;
      bottom: 12%;
      display: flex;
      align-items: end;
      justify-content: center;
      transform-origin: bottom center;
      animation: float 4s ease-in-out infinite;
    }

    .item::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 14px;
      background: rgba(0, 0, 0, 0.18);
      filter: blur(8px);
      border-radius: 50%;
      z-index: 0;
    }

    .shape {
      position: relative;
      z-index: 1;
    }

    /* TV */
    .tv {
      left: 4%;
      width: 18%;
      height: 42%;
      animation-delay: 0s;
    }

    .tv .shape {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #111, #222 45%, #000 100%);
      border: 10px solid #111;
      border-bottom-width: 14px;
      border-radius: 6px;
      box-shadow: inset -20px 0 30px rgba(255,255,255,0.06);
    }

    .tv .shape::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18%;
      width: 30%;
      height: 100%;
      background: rgba(255,255,255,0.08);
      transform: skewX(-18deg);
    }

    /* Outdoor unit */
    .outdoor {
      left: 20%;
      width: 10%;
      height: 18%;
      animation-delay: .4s;
    }

    .outdoor .shape {
      width: 100%;
      height: 100%;
      background: #f1f1f1;
      border: 3px solid #d2d2d2;
      border-radius: 12px;
      position: relative;
    }

    .outdoor .fan {
      position: absolute;
      width: 42%;
      aspect-ratio: 1;
      border: 4px solid #8c8c8c;
      border-radius: 50%;
      left: 12%;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 2s linear infinite;
      background:
        conic-gradient(from 0deg, #999 0 20deg, transparent 20deg 120deg, #999 120deg 140deg, transparent 140deg 240deg, #999 240deg 260deg, transparent 260deg 360deg);
    }

    .outdoor .knob1,
    .outdoor .knob2 {
      position: absolute;
      right: 12%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6b6b;
    }

    .outdoor .knob1 { top: 28%; }
    .outdoor .knob2 { top: 52%; background: #7ed957; }

    /* Fridge */
    .fridge {
      left: 27%;
      width: 14%;
      height: 58%;
      animation-delay: .7s;
    }

    .fridge .shape {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #646464, #a0a0a0 48%, #6c6c6c 100%);
      position: relative;
      overflow: hidden;
    }

    .fridge .shape::before {
      content: "";
      position: absolute;
      top: 0;
      left: 48%;
      width: 2px;
      height: 100%;
      background: rgba(255,255,255,0.5);
    }

    .fridge .display {
      position: absolute;
      right: 8%;
      top: 12%;
      width: 28%;
      height: 35%;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffab40, #ff7043);
      color: #fff;
      font-size: clamp(8px, 1vw, 14px);
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      animation: glow 2.5s ease-in-out infinite;
    }

    .fridge .water {
      position: absolute;
      left: 10%;
      top: 28%;
      width: 22%;
      height: 24%;
      background: #2f2f2f;
      border-radius: 0 0 8px 8px;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.12);
    }

    /* Stove */
    .stove {
      left: 42%;
      width: 16%;
      height: 50%;
      animation-delay: 1s;
    }

    .stove .shape {
      width: 100%;
      height: 100%;
      background: #f4f4f4;
      border: 3px solid #cfcfcf;
      border-radius: 4px;
      position: relative;
    }

    .stove .burner,
    .stove .burner2 {
      position: absolute;
      top: 8%;
      width: 18%;
      height: 10%;
      background: #222;
      border-radius: 50%;
    }

    .stove .burner { left: 25%; }
    .stove .burner2 { right: 25%; }

    .stove .flame,
    .stove .flame2 {
      position: absolute;
      top: 4%;
      width: 16px;
      height: 22px;
      background: radial-gradient(circle at 50% 70%, #ffd166 10%, #ff7b00 55%, transparent 60%);
      border-radius: 50% 50% 60% 60%;
      animation: flame 0.9s ease-in-out infinite alternate;
    }

    .stove .flame { left: 27%; }
    .stove .flame2 { right: 27%; animation-delay: .3s; }

    .stove .glass {
      position: absolute;
      left: 20%;
      bottom: 18%;
      width: 60%;
      height: 34%;
      border: 6px solid #111;
      background: linear-gradient(135deg, #1d1d1d, #474747 55%, #111);
    }

    .stove .glass::before {
      content: "";
      position: absolute;
      top: 0;
      left: 20%;
      width: 20%;
      height: 100%;
      background: rgba(255,255,255,0.18);
      transform: skewX(-16deg);
    }

    /* Washing machine */
    .wash {
      left: 58%;
      width: 14%;
      height: 48%;
      animation-delay: 1.3s;
    }

    .wash .shape {
      width: 100%;
      height: 100%;
      background: #f6f6f6;
      border: 3px solid #cecece;
      border-radius: 4px;
      position: relative;
    }

    .wash .lid {
      position: absolute;
      right: 8%;
      top: -2%;
      width: 28%;
      height: 18%;
      background: linear-gradient(135deg, #050505, #222);
      transform: skewY(18deg);
      border-radius: 3px;
      animation: lidMove 3s ease-in-out infinite;
      transform-origin: left bottom;
    }

    .wash .door {
      position: absolute;
      left: 21%;
      top: 28%;
      width: 58%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 8px solid #1f3153;
      background: radial-gradient(circle at 35% 35%, #54a9ff 0%, #2b6ecf 45%, #18386f 100%);
      overflow: hidden;
    }

    .wash .water {
      position: absolute;
      left: -10%;
      bottom: 0;
      width: 120%;
      height: 50%;
      background: rgba(255,255,255,0.45);
      border-radius: 45% 55% 50% 50%;
      animation: swirl 2.2s linear infinite;
    }

    /* Microwave */
    .micro {
      left: 73%;
      width: 10%;
      height: 18%;
      animation-delay: .5s;
    }

    .micro .shape {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #cccccc, #909090);
      border: 3px solid #b5b5b5;
      position: relative;
    }

    .micro .screen {
      position: absolute;
      left: 10%;
      top: 15%;
      width: 58%;
      height: 70%;
      background: linear-gradient(135deg, #111, #555);
      border: 2px solid #333;
    }

    .micro .screen::before {
      content: "";
      position: absolute;
      top: 0;
      left: 25%;
      width: 18%;
      height: 100%;
      background: rgba(255,255,255,0.18);
      transform: skewX(-18deg);
    }

    .micro .buttons {
      position: absolute;
      right: 8%;
      top: 18%;
      width: 18%;
      height: 60%;
      background: repeating-linear-gradient(to bottom, #666 0 6px, #bbb 6px 12px);
    }

    /* AC indoor unit */
    .ac {
      right: 6%;
      top: 5%;
      bottom: auto;
      width: 22%;
      height: 16%;
      animation-delay: .2s;
      animation-name: acFloat;
    }

    .ac .shape {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #ffffff, #e9e9e9);
      border: 2px solid #d8d8d8;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .ac .vent {
      position: absolute;
      left: 14%;
      bottom: 18%;
      width: 72%;
      height: 10%;
      background: #444;
      border-radius: 10px;
    }

    .ac .temp {
      position: absolute;
      right: 8%;
      top: 18%;
      font-size: clamp(10px, 1vw, 16px);
      color: #ff6b6b;
      font-weight: bold;
    }

    .air {
      position: absolute;
      left: 22%;
      bottom: -30%;
      width: 60%;
      height: 90%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      border-color: rgba(255,255,255,0.4) transparent transparent transparent;
      animation: airflow 1.5s linear infinite;
      opacity: 0;
    }

    .air.a2 { animation-delay: .5s; }
    .air.a3 { animation-delay: 1s; }

    /* Fan */
    .fanstand {
      right: 10%;
      width: 10%;
      height: 40%;
      animation-delay: .9s;
    }

    .fanstand .pole {
      position: absolute;
      left: 49%;
      bottom: 8%;
      width: 4%;
      height: 46%;
      background: #222;
      z-index: 1;
    }

    .fanstand .base {
      position: absolute;
      left: 28%;
      bottom: 0;
      width: 44%;
      height: 10%;
      background: #1b1b1b;
      border-radius: 50% 50% 10px 10px;
      z-index: 1;
    }

    .fanstand .head {
      position: absolute;
      left: 20%;
      top: 2%;
      width: 60%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid #333;
      background: radial-gradient(circle, #1f1f1f 0 14%, #8f8f8f 15% 17%, transparent 18%);
      z-index: 2;
      animation: turnSide 3s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .fanstand .head::before {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      background:
        conic-gradient(#2a2a2a 0 35deg, transparent 35deg 120deg, #2a2a2a 120deg 155deg, transparent 155deg 240deg, #2a2a2a 240deg 275deg, transparent 275deg 360deg);
      animation: spin .55s linear infinite;
    }

    .fanstand .grill {
      position: absolute;
      inset: 3%;
      border-radius: 50%;
      border: 2px solid #888;
      background: repeating-radial-gradient(circle, transparent 0 6px, rgba(255,255,255,0.15) 6px 7px);
    }

    /* Blender */
    .blender {
      right: 19%;
      width: 6%;
      height: 22%;
      animation-delay: 1.1s;
    }

    .blender .jar {
      position: absolute;
      top: 0;
      left: 22%;
      width: 56%;
      height: 52%;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.55));
      border: 2px solid #cfcfcf;
      border-radius: 6px 6px 2px 2px;
      overflow: hidden;
    }

    .blender .juice {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(180deg, #ff5a5a, #b52121);
      animation: blend 0.35s linear infinite;
    }

    .blender .base {
      position: absolute;
      left: 15%;
      bottom: 0;
      width: 70%;
      height: 40%;
      background: #d9d9d9;
      border-radius: 4px;
      border: 2px solid #b7b7b7;
    }

    /* Coffee machine */
    .coffee {
      right: 1%;
      width: 9%;
      height: 16%;
      animation-delay: 1.4s;
    }

    .coffee .shape {
      width: 100%;
      height: 100%;
      background: #efefef;
      border: 2px solid #cccccc;
      border-radius: 4px;
      position: relative;
    }

    .coffee .cup {
      position: absolute;
      left: 44%;
      bottom: 10%;
      width: 18%;
      height: 24%;
      background: #fff;
      border: 2px solid #999;
      border-top: 0;
    }

    .coffee .cup::before {
      content: "";
      position: absolute;
      right: -7px;
      top: 4px;
      width: 6px;
      height: 10px;
      border: 2px solid #999;
      border-left: 0;
      border-radius: 0 6px 6px 0;
    }

    .coffee .steam,
    .coffee .steam2 {
      position: absolute;
      bottom: 34%;
      width: 10px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.7) transparent transparent transparent;
      border-radius: 50%;
      animation: steam 1.2s linear infinite;
      opacity: 0;
    }

    .coffee .steam { left: 42%; }
    .coffee .steam2 { left: 54%; animation-delay: .5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes acFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes spin {
      from { transform: translateY(-50%) rotate(0deg); }
      to { transform: translateY(-50%) rotate(360deg); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 rgba(255,170,64,0.4); }
      50% { box-shadow: 0 0 18px rgba(255,170,64,0.6); }
    }

    @keyframes flame {
      from { transform: scaleY(0.9) translateY(0); opacity: .8; }
      to { transform: scaleY(1.2) translateY(-2px); opacity: 1; }
    }

    @keyframes swirl {
      from { transform: rotate(0deg) translateX(2px); }
      to { transform: rotate(360deg) translateX(2px); }
    }

    @keyframes lidMove {
      0%, 100% { transform: skewY(18deg) rotate(0deg); }
      50% { transform: skewY(18deg) rotate(-8deg); }
    }

    @keyframes airflow {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(28px) scale(1.2); opacity: 0; }
    }

    @keyframes turnSide {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    @keyframes blend {
      from { transform: translateX(-1px) scaleY(1); }
      to { transform: translateX(1px) scaleY(1.04); }
    }

    @keyframes steam {
      0% { transform: translateY(6px) scale(0.8); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(-16px) scale(1.1); opacity: 0; }
    }

    @media (max-width: 768px) {
      .banner {
        aspect-ratio: 16 / 9;
      }

      .item {
        transform: scale(0.92);
        transform-origin: bottom center;
      }
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="item tv"><div class="shape"></div></div>

    <div class="item outdoor">
      <div class="shape">
        <div class="fan"></div>
        <div class="knob1"></div>
        <div class="knob2"></div>
      </div>
    </div>

    <div class="item fridge">
      <div class="shape">
        <div class="water"></div>
        <div class="display">
          <span>10</span>
          <span>13</span>
        </div>
      </div>
    </div>

    <div class="item stove">
      <div class="shape">
        <div class="burner"></div>
        <div class="burner2"></div>
        <div class="flame"></div>
        <div class="flame2"></div>
        <div class="glass"></div>
      </div>
    </div>

    <div class="item wash">
      <div class="shape">
        <div class="lid"></div>
        <div class="door">
          <div class="water"></div>
        </div>
      </div>
    </div>

    <div class="item micro">
      <div class="shape">
        <div class="screen"></div>
        <div class="buttons"></div>
      </div>
    </div>

    <div class="item ac">
      <div class="shape">
        <div class="temp">26</div>
        <div class="vent"></div>
        <div class="air"></div>
        <div class="air a2"></div>
        <div class="air a3"></div>
      </div>
    </div>

    <div class="item fanstand">
      <div class="pole"></div>
      <div class="base"></div>
      <div class="head">
        <div class="grill"></div>
      </div>
    </div>

    <div class="item blender">
      <div class="jar"><div class="juice"></div></div>
      <div class="base"></div>
    </div>

    <div class="item coffee">
      <div class="shape">
        <div class="cup"></div>
        <div class="steam"></div>
        <div class="steam2"></div>
      </div>
    </div>

    <div class="ground"></div>
  </div>
</body>
</html>
