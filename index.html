<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Cool Authorized Service Centre</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;scroll-behavior:smooth}
    body{background:#eef7fd;color:#222;overflow-x:hidden;position:relative}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%, rgba(10,124,194,.10), transparent 22%),radial-gradient(circle at 80% 30%, rgba(37,211,102,.08), transparent 18%),radial-gradient(circle at 50% 80%, rgba(10,124,194,.08), transparent 24%),linear-gradient(135deg,#f4fbff,#e9f6ff,#f7fcff);z-index:-4}
    body::after{content:"";position:fixed;top:0;left:-20%;width:140%;height:100%;background:repeating-linear-gradient(90deg,rgba(10,124,194,.02) 0px,rgba(10,124,194,.02) 2px,transparent 2px,transparent 140px);animation:bgMove 20s linear infinite;z-index:-3;opacity:.8}
    .bg-air,.bg-icons{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .bg-air{z-index:-2}.bg-icons{z-index:-1}
    .bg-air span{position:absolute;display:block;width:340px;height:34px;border-radius:50%;background:linear-gradient(to right,rgba(10,124,194,0),rgba(10,124,194,.14),rgba(10,124,194,0));filter:blur(1px);animation:floatAir 13s linear infinite;opacity:.55}
    .bg-air span:nth-child(1){top:12%;left:-25%;animation-delay:0s}.bg-air span:nth-child(2){top:28%;left:-35%;animation-delay:2s}.bg-air span:nth-child(3){top:44%;left:-20%;animation-delay:4s}.bg-air span:nth-child(4){top:60%;left:-30%;animation-delay:1s}.bg-air span:nth-child(5){top:76%;left:-22%;animation-delay:5s}.bg-air span:nth-child(6){top:88%;left:-28%;animation-delay:7s}
    .bg-icons div{position:absolute;font-size:34px;opacity:.10;animation:floatIcon 18s ease-in-out infinite}
    .bg-icons div:nth-child(1){top:8%;left:6%;animation-delay:0s}.bg-icons div:nth-child(2){top:18%;right:10%;animation-delay:3s}.bg-icons div:nth-child(3){top:38%;left:12%;animation-delay:6s}.bg-icons div:nth-child(4){top:56%;right:8%;animation-delay:1s}.bg-icons div:nth-child(5){top:72%;left:8%;animation-delay:4s}.bg-icons div:nth-child(6){top:84%;right:14%;animation-delay:7s}
    @keyframes bgMove{0%{transform:translateX(0)}100%{transform:translateX(120px)}}
    @keyframes floatAir{0%{transform:translateX(0) scaleX(.95);opacity:0}15%{opacity:.55}85%{opacity:.55}100%{transform:translateX(120vw) scaleX(1.08);opacity:0}}
    @keyframes floatIcon{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(6deg)}}

    .intro{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#eaf6ff,#fff);display:flex;justify-content:center;align-items:center;z-index:10000;overflow:hidden;animation:introHide 6s forwards}
    .intro-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px}
    .ac-unit{position:relative;width:360px;max-width:88vw;height:150px;perspective:1000px;animation:acFloat 2.2s ease-in-out infinite}
    .ac-body{position:absolute;top:0;left:0;width:100%;height:90px;background:linear-gradient(to bottom,#fff,#dfe8ef);border-radius:20px 20px 12px 12px;box-shadow:0 10px 30px rgba(0,0,0,.12);border:1px solid #d9e2ea;overflow:hidden}
    .ac-brand{position:absolute;left:18px;top:14px;font-size:16px;font-weight:bold;color:#0a7cc2;letter-spacing:.5px}
    .ac-line{position:absolute;left:18px;right:50px;bottom:18px;height:6px;background:linear-gradient(to right,#dbe6ee,#f8fbfd,#dbe6ee);border-radius:20px}
    .ac-led{position:absolute;right:18px;top:16px;width:10px;height:10px;background:#25D366;border-radius:50%;box-shadow:0 0 12px rgba(37,211,102,.7);animation:blinkLed 1s infinite}
    .ac-flapper{position:absolute;left:12px;right:12px;top:82px;height:26px;background:linear-gradient(to bottom,#fdfdfd,#cdd7df);border-radius:0 0 18px 18px;transform-origin:top center;transform:rotateX(0deg);animation:openFlapper 1.8s ease forwards;animation-delay:.8s;box-shadow:0 8px 18px rgba(0,0,0,.12)}
    .air-flow{position:absolute;top:108px;left:20px;width:320px;max-width:80vw;height:70px;opacity:0;animation:showAir 1.5s ease forwards;animation-delay:1.8s}
    .air-wave{position:absolute;width:100%;height:18px;border-radius:50%;background:linear-gradient(to right, rgba(10,124,194,.05), rgba(10,124,194,.25), rgba(10,124,194,.05));animation:waveMove 1.2s linear infinite}
    .air-wave:nth-child(1){top:0}.air-wave:nth-child(2){top:22px;animation-delay:.2s}.air-wave:nth-child(3){top:44px;animation-delay:.4s}
    .intro-logo-box{text-align:center;opacity:0;transform:translateY(20px) scale(.95);animation:showLogoBox 1.2s ease forwards;animation-delay:2.8s}
    .intro-logo{width:130px;height:130px;object-fit:contain;background:#fff;padding:12px;border-radius:50%;box-shadow:0 10px 30px rgba(0,0,0,.12);animation:logoPulse 2s ease-in-out infinite}
    .intro-logo-box h1{margin-top:15px;color:#0a7cc2;font-size:32px}.intro-logo-box p{margin-top:8px;color:#444;font-size:16px}
    @keyframes openFlapper{0%{transform:rotateX(0)}100%{transform:rotateX(-68deg)}}
    @keyframes blinkLed{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes showAir{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes waveMove{0%{transform:translateX(0);opacity:.45}50%{transform:translateX(8px);opacity:.8}100%{transform:translateX(0);opacity:.45}}
    @keyframes acFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes showLogoBox{0%{opacity:0;transform:translateY(20px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes logoPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    @keyframes introHide{0%,88%{opacity:1;visibility:visible}100%{opacity:0;visibility:hidden;pointer-events:none}}
    @keyframes fadeDown{0%{opacity:0;transform:translateY(-30px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes zoomIn{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
    @keyframes pulseBtn{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
    @keyframes scrollGallery{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
